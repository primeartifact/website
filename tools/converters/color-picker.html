  <!-- Core Color Picker Logic -->
  <script>
    (function () {
      var picker = document.getElementById('picker');
      var preview = document.getElementById('preview');
      var hexInput = document.getElementById('hex-val');
      var rgbInput = document.getElementById('rgb-val');
      var hslInput = document.getElementById('hsl-val');
      var rgbaInput = document.getElementById('rgba-val');

      function hexToRgb(hex) {
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
        return { r: parseInt(hex.substring(0, 2), 16), g: parseInt(hex.substring(2, 4), 16), b: parseInt(hex.substring(4, 6), 16) };
      }

      function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var max = Math.max(r, g, b), min = Math.min(r, g, b), h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } else {
          var d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) { case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break; case g: h = ((b - r) / d + 2) / 6; break; case b: h = ((r - g) / d + 4) / 6; break; }
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
      }

      function updateFromHex(hex) {
        if (!/^#?[0-9a-fA-F]{3,6}$/.test(hex)) return;
        if (hex[0] !== '#') hex = '#' + hex;
        var rgb = hexToRgb(hex);
        var hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
        preview.style.background = hex;
        picker.value = hex;
        hexInput.value = hex;
        rgbInput.value = 'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')';
        hslInput.value = 'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)';
        rgbaInput.value = 'rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', 1)';
      }

      picker.addEventListener('input', function () { updateFromHex(this.value); });
      hexInput.addEventListener('input', function () { updateFromHex(this.value); });

      document.querySelectorAll('.color-field__copy').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var target = document.getElementById(this.dataset.target);
          navigator.clipboard.writeText(target.value);
          this.textContent = 'âœ“'; var b = this; setTimeout(function () { b.textContent = 'Copy'; }, 1200);
        });
      });

      var colors = ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#1a1a1a', '#4a4a4a', '#6b7280', '#9ca3af', '#d1d5db', '#f3f4f6', '#ffffff'];
      var palette = document.getElementById('palette');
      colors.forEach(function (c) {
        var swatch = document.createElement('div');
        swatch.className = 'palette-swatch';
        swatch.style.background = c;
        swatch.title = c;
        swatch.addEventListener('click', function () { updateFromHex(c); });
        palette.appendChild(swatch);
      });

      updateFromHex('#4a6fa5');
    })();
  </script>

  <!-- Interactive Liquid Color Aura Background Logic -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    let orbs = [];
    let mouseX = -1000, mouseY = -1000;

    // Track mouse for interactivity
    window.addEventListener('mousemove', (e) => {
      mouseX = e.pageX;
      mouseY = e.pageY;
    });

    function initCanvas() {
      canvas.width = document.body.scrollWidth;
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);

      orbs = [];
      const numOrbs = 12; // Just enough for a smooth fluid background
      for (let i = 0; i < numOrbs; i++) {
        orbs.push(new LiquidOrb());
      }
    }

    class LiquidOrb {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 150 + 100; // Big, soft circles
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        // Natural pulsing
        this.angle = Math.random() * Math.PI * 2;
      }

      update() {
        // Gently follow the mouse
        let dx = mouseX - this.x;
        let dy = mouseY - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 400) { // Attraction radius
          this.vx += dx * 0.0002;
          this.vy += dy * 0.0002;
        }

        // Apply friction so they don't move too fast
        this.vx *= 0.99;
        this.vy *= 0.99;

        // Normal drifting
        this.x += this.vx;
        this.y += this.vy;
        this.angle += 0.02;

        // Bounce off edges gently
        if (this.x < -this.radius) this.vx += 0.1;
        if (this.x > canvas.width + this.radius) this.vx -= 0.1;
        if (this.y < -this.radius) this.vy += 0.1;
        if (this.y > canvas.height + this.radius) this.vy -= 0.1;
      }

      draw(r, g, b) {
        // Create a soft glowing radial gradient for each orb
        // Pulse size slightly
        let rPulse = this.radius + Math.sin(this.angle) * 20;
        let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, rPulse);

        // Inner color is 15% opacity, fades to 0%
        gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.15)`);
        gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.beginPath();
        ctx.arc(this.x, this.y, rPulse, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
    }

    window.addEventListener('resize', initCanvas);
    const resizeObserver = new ResizeObserver(() => {
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
    });
    resizeObserver.observe(document.body);

    initCanvas();

    // Helper to extract r,g,b from the tool's RGB input field
    function getCurrentRGB() {
      const rgbStr = document.getElementById('rgb-val').value;
      const match = rgbStr.match(/\d+/g);
      if (match && match.length >= 3) {
        return { r: match[0], g: match[1], b: match[2] };
      }
      return { r: 74, g: 111, b: 165 }; // Fallback to PrimeArtifact blue
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Get the live color from the tool
      const color = getCurrentRGB();

      orbs.forEach(orb => {
        orb.update();
        orb.draw(color.r, color.g, color.b);
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>
