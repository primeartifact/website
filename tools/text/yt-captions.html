<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Captions Scraper | PrimeArtifact</title>
    <meta name="description" content="Extract the full transcript of any YouTube video instantly. Free, fast, and secure.">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../js/theme.js"></script>
    <style>
        .scraper-container {
            max-width: 1100px;
            margin: 2rem auto;
            position: relative;
        }

        .scraper-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .scraper-layout.has-data {
            grid-template-columns: 350px 1fr;
        }

        @media (max-width: 850px) {
            .scraper-layout.has-data {
                grid-template-columns: 1fr;
            }
        }

        /* Search Area */
        .search-area {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .search-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 0.4rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .search-box-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 10px 40px rgba(74, 111, 165, 0.25);
            transform: translateY(-2px);
            background: var(--glass-bg-hover);
        }

        .yt-icon {
            padding: 0 1rem 0 1.5rem;
            color: #ff0000;
            display: flex;
            align-items: center;
        }
        
        .yt-icon svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
            filter: drop-shadow(0 2px 8px rgba(255,0,0,0.3));
        }

        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            padding: 0.8rem 0.5rem;
            outline: none;
            width: 100%;
        }

        .url-input::placeholder {
            color: var(--text-tertiary);
        }

        .extract-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2.2rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.3);
            white-space: nowrap;
        }

        .extract-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.4);
        }

        .extract-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Sidebar - Video Info */
        .video-sidebar {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideInLeft 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.1s;
        }

        .scraper-layout.has-data .video-sidebar {
            display: flex;
        }

        .video-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(12px);
        }

        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #111;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .video-card:hover .thumbnail-img {
            transform: scale(1.08);
        }

        .video-stats {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.8rem;
            border-bottom: 1px dashed var(--glass-border);
        }

        .stat-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .stat-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(74, 111, 165, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }

        /* Main Output Area */
        .output-container {
            display: none;
            flex-direction: column;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(12px);
            opacity: 0;
            transform: translateY(30px);
            animation: slideInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.2s;
        }

        .scraper-layout.has-data .output-container {
            display: flex;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
            border-bottom: 1px solid var(--glass-border);
        }

        .output-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        
        .output-title i {
            color: var(--accent);
        }

        .action-btn {
            background: rgba(74, 111, 165, 0.1);
            border: 1px solid rgba(74, 111, 165, 0.3);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.2);
        }

        .transcript-output {
            width: 100%;
            height: 500px;
            padding: 1.8rem;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        .transcript-output::selection {
            background: rgba(74, 111, 165, 0.3);
        }

        /* Loading Spinner & Status */
        .spinner {
            display: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .extract-btn.loading .btn-text { display: none; }
        .extract-btn.loading .spinner { display: inline-block; }

        .status-message {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            min-height: 20px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .error-message { color: #ff6b6b; font-weight: 600; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { to { opacity: 1; transform: translateX(0); } }
        
        /* Floating background decoration */
        .bg-glow {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,0,0,0.025) 0%, rgba(0,0,0,0) 60%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav class="navbar"></nav>
    <script src="../../js/navbar.js"></script>

    <main class="page animate-in">
        <div class="container">
            <header class="page-header" style="margin-bottom: 2rem;">
                <h1 class="page-header__title">YouTube Captions Scraper</h1>
                <p class="page-header__subtitle">Extract the full text script of any YouTube video instantly.</p>
            </header>

            <div class="scraper-container">
                <div class="scraper-layout" id="main-layout">
                    
                    <div class="search-area">
                        <div class="search-box-wrapper">
                            <div class="yt-icon">
                                <svg viewBox="0 0 24 24">
                                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/>
                                    <path fill="#ffffff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                                </svg>
                            </div>
                            <input type="text" id="yt-url" class="url-input" placeholder="Paste a YouTube URL here..." autocomplete="off">
                            <button id="extract-btn" class="extract-btn">
                                <span class="btn-text">Extract Script</span>
                                <div class="spinner"></div>
                            </button>
                        </div>
                        <div id="status-msg" class="status-message"></div>
                    </div>

                    <!-- Sidebar: Video Info -->
                    <div class="video-sidebar">
                        <div class="video-card">
                            <div class="thumbnail-container">
                                <img id="video-thumbnail" class="thumbnail-img" src="" alt="Video Thumbnail">
                            </div>
                            <div class="video-stats">
                                <div class="stat-item">
                                    <span class="stat-label">Word Count</span>
                                    <span class="stat-value" id="stat-words">0</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Characters</span>
                                    <span class="stat-value" id="stat-chars">0</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Language</span>
                                    <span class="stat-value" id="stat-lang">English</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Main Output -->
                    <div class="output-container">
                        <div class="output-header">
                            <div class="output-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                                Extracted Transcript
                            </div>
                            <div class="output-actions">
                                <button id="copy-btn" class="action-btn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                    Copy Script
                                </button>
                            </div>
                        </div>
                        <textarea id="transcript-output" class="transcript-output" readonly></textarea>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="../../js/effects.js"></script>
    <script src="../../js/toast.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const layout = document.getElementById('main-layout');
            const urlInput = document.getElementById('yt-url');
            const extractBtn = document.getElementById('extract-btn');
            const outputArea = document.getElementById('transcript-output');
            const copyBtn = document.getElementById('copy-btn');
            const statusMsg = document.getElementById('status-msg');
            
            // Video Info Elements
            const thumbnailImg = document.getElementById('video-thumbnail');
            const statWords = document.getElementById('stat-words');
            const statChars = document.getElementById('stat-chars');

            // Extracts video ID on frontend for thumbnail
            function extractVideoId(urlStr) {
                try {
                    const url = new URL(urlStr);
                    if (url.hostname.includes('youtu.be')) return url.pathname.slice(1).split('?')[0];
                    return url.searchParams.get('v');
                } catch(e) {
                    const match = urlStr.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?\n]+)/);
                    return match ? match[1] : null;
                }
            }

            const setStatus = (msg, isError = false) => {
                if (isError) {
                    statusMsg.textContent = ''; // clear status
                    if (window.paToast) {
                        window.paToast("Could not extract captions. Please check the URL or try another video.", { icon: '⚠️' });
                    } else {
                        statusMsg.textContent = "Could not extract captions. Please check the URL or try another video.";
                        statusMsg.classList.add('error-message');
                    }
                } else {
                    statusMsg.textContent = msg;
                    statusMsg.classList.remove('error-message');
                }
            };

            const toggleLoading = (isLoading) => {
                if (isLoading) {
                    extractBtn.classList.add('loading');
                    extractBtn.disabled = true;
                    urlInput.disabled = true;
                } else {
                    extractBtn.classList.remove('loading');
                    extractBtn.disabled = false;
                    urlInput.disabled = false;
                }
            };

            extractBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                
                if (!url) {
                    setStatus('Please enter a YouTube URL.', true);
                    return;
                }

                const videoId = extractVideoId(url);
                if (!videoId) {
                    setStatus('Please enter a valid YouTube URL.', true);
                    return;
                }

                // Reset state
                layout.classList.remove('has-data');
                setStatus('Extracting captions from YouTube servers...');
                toggleLoading(true);
                outputArea.value = '';

                try {
                    // Update thumbnail immediately for visual feedback
                    thumbnailImg.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    
                    // Fallback to high-res if maxres is missing (YouTube behaviour)
                    thumbnailImg.onerror = function() {
                        if (this.src.includes('maxresdefault')) {
                            this.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                        }
                    };

                    const response = await fetch(`/api/yt-captions?url=${encodeURIComponent(url)}`);
                    let data;
                    try {
                        data = await response.json();
                    } catch(e) {
                        console.error("Backend response is not JSON:", e);
                        throw new Error("Invalid response from server. Are you running this locally without the Cloudflare server environment?");
                    }

                    if (!response.ok) {
                        console.error("Backend API Error:", data.error || 'Failed to extract captions.');
                        throw new Error(data.error || 'Failed to extract captions.');
                    }

                    if (data.text) {
                        const text = data.text;
                        const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
                        
                        // Populate UI
                        outputArea.value = text;
                        statWords.textContent = wordCount.toLocaleString();
                        statChars.textContent = text.length.toLocaleString();
                        
                        // Trigger animations
                        layout.classList.add('has-data');
                        setStatus('');
                    } else {
                        console.error("Transcript data is empty inside successful response object.");
                        throw new Error('Transcript data is empty.');
                    }

                } catch (err) {
                    console.error("Extraction Failed:", err.message);
                    setStatus(err.message, true);
                } finally {
                    toggleLoading(false);
                }
            });

            copyBtn.addEventListener('click', () => {
                if (!outputArea.value) return;
                
                navigator.clipboard.writeText(outputArea.value).then(() => {
                    const originalHtml = copyBtn.innerHTML;
                    copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
                    copyBtn.style.background = 'var(--accent)';
                    copyBtn.style.color = 'white';
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHtml;
                        copyBtn.style.background = '';
                        copyBtn.style.color = '';
                    }, 2000);
                });
            });
            
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') extractBtn.click();
            });
        });
    </script>
</body>
</html>
