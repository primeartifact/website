  <!-- Subtle Matrix Background Logic -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    const chars = '01#@%&*';
    let drops = [];
    const fontSize = 16;
    let columns;

    function initCanvas() {
      canvas.width = document.body.scrollWidth;
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
      columns = Math.floor(canvas.width / fontSize) + 1;
      drops = [];
      for (let x = 0; x < columns; x++) {
        // Skip columns to make it less dense/distracting
        drops[x] = (x % 2 === 0) ? Math.random() * -100 : -9999;
      }
    }

    let mouseX = -1000, mouseY = -1000;
    window.addEventListener('mousemove', (e) => {
      mouseX = e.pageX;
      mouseY = e.pageY;
    });

    window.addEventListener('resize', initCanvas);
    const resizeObserver = new ResizeObserver(() => {
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
    });
    resizeObserver.observe(document.body);

    initCanvas();

    function drawMatrix() {
      // Fade out background to create trails
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-page');
      ctx.globalAlpha = 0.15;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const defaultColor = getComputedStyle(document.body).getPropertyValue('--text-tertiary').trim() || '#8b909e';
      const highlightColor = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#4a6fa5';

      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        if (drops[i] === -9999) continue; // Skip empty columns

        const text = chars[Math.floor(Math.random() * chars.length)];
        let dropX = i * fontSize;
        let dropY = drops[i] * fontSize;

        let dx = mouseX - dropX;
        let dy = mouseY - dropY;
        let dist = Math.sqrt(dx * dx + dy * dy);

        let isHighlighted = dist < 120; // Mouse interaction radius

        ctx.fillStyle = isHighlighted ? highlightColor : defaultColor;

        // EXTREMELY LOW OPACITY: 0.05 normally, 0.25 when mouse hovers over it
        ctx.globalAlpha = isHighlighted ? 0.25 : 0.05;

        // Interactive mouse scatter
        if (isHighlighted) dropX -= dx * 0.2;

        ctx.fillText(text, dropX, dropY);

        // Randomly send back to top
        if (dropY > canvas.height && Math.random() > 0.95) {
          drops[i] = 0;
        }
        drops[i]++;
      }
      // Reset global alpha
      ctx.globalAlpha = 1.0;
    }

    setInterval(drawMatrix, 50);
  </script>

  <!-- Password Generator Logic -->
  <script>
    (function () {
      var out = document.getElementById('password-output');
      var fill = document.getElementById('strength-fill');
      var slabel = document.getElementById('strength-label');
      var lenSlider = document.getElementById('length');
      var lenVal = document.getElementById('length-val');

      lenSlider.addEventListener('input', function () { lenVal.textContent = this.value; });

      function generate() {
        var len = parseInt(lenSlider.value);
        var chars = '';
        if (document.getElementById('opt-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (document.getElementById('opt-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (document.getElementById('opt-numbers').checked) chars += '0123456789';
        if (document.getElementById('opt-symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        if (document.getElementById('opt-ambiguous').checked) chars = chars.replace(/[0OIl1]/g, '');
        if (!chars) { out.textContent = 'Select at least one option'; return; }
        var arr = new Uint32Array(len);
        crypto.getRandomValues(arr);
        var pw = Array.from(arr).map(function (n) { return chars[n % chars.length]; }).join('');
        out.textContent = pw;
        showStrength(pw);
      }

      function showStrength(pw) {
        var score = 0;
        if (pw.length >= 8) score++;
        if (pw.length >= 12) score++;
        if (pw.length >= 20) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        var pct = Math.min(100, (score / 6) * 100);
        var color = pct < 40 ? '#c0392b' : pct < 70 ? '#b8860b' : '#3a8a6a';
        var label = pct < 40 ? 'Weak' : pct < 70 ? 'Moderate' : pct < 90 ? 'Strong' : 'Very Strong';
        fill.style.width = pct + '%';
        fill.style.background = color;
        slabel.textContent = label;
        slabel.style.color = color;
      }

      document.getElementById('btn-generate').addEventListener('click', generate);
      document.getElementById('btn-copy').addEventListener('click', function () {
        var t = out.textContent;
        if (t && t !== 'Click Generate' && t !== 'Select at least one option') {
          navigator.clipboard.writeText(t);
          this.textContent = '✓ Copied';
          var b = this;
          setTimeout(function () { b.textContent = '⧉ Copy'; }, 1500);
        }
      });
      generate();
    })();
  </script>
