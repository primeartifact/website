# ╔══════════════════════════════════════════════════════════════╗
# ║  PrimeArtifact — Netlify Configuration                         ║
# ╚══════════════════════════════════════════════════════════════╝

[build]
  publish = "."          # Root is the published folder (no build step needed)
  # command = ""         # No build command — pure static site

# ── Security & Performance Headers ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache HTML for 10 minutes (fresh but not stale)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=3600"

# Cache CSS / JS for 1 year (they're fingerprinted via filename when you add a build step later)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache assets (fonts, images, icons) for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache favicon forever
[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

