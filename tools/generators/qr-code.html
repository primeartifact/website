  <!-- Clean, Subtle QR Block Background Logic -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    // Increased block size and spread them out to show fewer things
    let blockSize = 28;
    let columns;
    let drops = [];

    function initCanvas() {
      canvas.width = document.body.scrollWidth;
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);

      // Only spawn a drop in every 2nd column to reduce clutter
      columns = Math.floor(canvas.width / blockSize) + 1;
      drops = [];
      for (let x = 0; x < columns; x++) {
        // Leave gaps between columns
        drops[x] = (x % 2 === 0) ? Math.random() * -100 : -9999;
      }
    }

    let mouseX = -1000, mouseY = -1000;
    window.addEventListener('mousemove', (e) => {
      mouseX = e.pageX;
      mouseY = e.pageY;
    });

    window.addEventListener('resize', initCanvas);
    const resizeObserver = new ResizeObserver(() => {
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
    });
    resizeObserver.observe(document.body);

    initCanvas();

    function drawMatrix() {
      // Fade out background to create short trails
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-page');
      ctx.globalAlpha = 0.15;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const defaultColor = getComputedStyle(document.body).getPropertyValue('--text-tertiary').trim() || '#8b909e';
      const highlightColor = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#4a6fa5';

      for (let i = 0; i < drops.length; i++) {
        // Skip empty columns
        if (drops[i] === -9999) continue;

        let x = i * blockSize;
        let y = drops[i] * blockSize;

        let dx = mouseX - x;
        let dy = mouseY - y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        let isHighlighted = dist < 120; // Mouse interaction radius

        ctx.fillStyle = isHighlighted ? highlightColor : defaultColor;
        ctx.strokeStyle = isHighlighted ? highlightColor : defaultColor;

        // EXTREMELY LOW OPACITY: 0.04 normally, 0.2 when mouse hovers over it
        ctx.globalAlpha = isHighlighted ? 0.2 : 0.04;

        if (Math.random() > 0.5) {
          ctx.fillRect(x + 4, y + 4, blockSize - 8, blockSize - 8);
        } else {
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 5, y + 5, blockSize - 10, blockSize - 10);
        }

        if (y > canvas.height && Math.random() > 0.95) {
          drops[i] = 0;
        }
        drops[i]++;
      }

      // Reset global alpha
      ctx.globalAlpha = 1.0;
    }

    // Run animation slightly slower
    setInterval(drawMatrix, 60);
  </script>

  <script>
    (function () {
      var input = document.getElementById('text-input');
      var canvasEl = document.getElementById('qr-canvas');
      var sizeSelect = document.getElementById('qr-size');
      var eclSelect = document.getElementById('qr-ecl');

      function generate() {
        var text = input.value.trim();
        if (!text) { paToast('Please enter some text or a URL to generate a QR code.', { icon: '📱' }); return; }
        var ecl = eclSelect.value;
        var cellSize = parseInt(sizeSelect.value);
        try {
          var qr = qrcode(0, ecl);
          qr.addData(text);
          qr.make();
          canvasEl.innerHTML = qr.createImgTag(cellSize, 0);
        } catch (e) {
          canvasEl.innerHTML = '<p style="color:var(--error);font-size:0.85rem;">Text too long for this error correction level. Try a lower level.</p>';
        }
      }

      // Custom Select Initialization
      function initCustomSelect(wrapperId, btnId, menuId, inputId, onChange) {
        var w = document.getElementById(wrapperId);
        var b = document.getElementById(btnId);
        var m = document.getElementById(menuId);
        var i = document.getElementById(inputId);

        b.addEventListener('click', function (e) { e.stopPropagation(); m.classList.toggle('open'); b.classList.toggle('open'); });
        m.querySelectorAll('.custom-select-item').forEach(function (item) {
          item.addEventListener('click', function (e) {
            e.stopPropagation();
            m.querySelectorAll('.custom-select-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            i.value = this.getAttribute('data-value');
            b.textContent = this.textContent;
            m.classList.remove('open'); b.classList.remove('open');
            if (onChange) onChange();
          });
        });
        document.addEventListener('click', function (e) {
          if (!w.contains(e.target)) { m.classList.remove('open'); b.classList.remove('open'); }
        });
      }

      initCustomSelect('qr-size-wrapper', 'qr-size-btn', 'qr-size-menu', 'qr-size', generate);
      initCustomSelect('qr-ecl-wrapper', 'qr-ecl-btn', 'qr-ecl-menu', 'qr-ecl', generate);

      input.addEventListener('input', generate);

      document.getElementById('btn-download').addEventListener('click', function () {
        var img = canvasEl.querySelector('img');
        if (!img) return;
        var a = document.createElement('a');
        a.href = img.src;
        a.download = 'qrcode.png';
        a.click();
      });

      document.getElementById('btn-copy').addEventListener('click', function () {
        var img = canvasEl.querySelector('img');
        if (!img) return;
        var c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        c.getContext('2d').drawImage(img, 0, 0);
        c.toBlob(function (blob) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        });
        this.textContent = '✓ Copied';
        var b = this;
        setTimeout(function () { b.textContent = '⧉ Copy to Clipboard'; }, 1500);
      });

      generate();
    })();
  </script>
