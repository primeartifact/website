<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f8f9fb"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e0e3ea" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#g)" opacity="0.6"/>
  <!-- card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="white" opacity="0.9"
        filter="none" stroke="#e0e3ea" stroke-width="1.5"/>
  <!-- brand icon -->
  <rect x="120" y="130" width="72" height="72" rx="16" fill="#4a6fa5"/>
  <text x="156" y="183" font-family="'Inter',system-ui,sans-serif"
        font-size="44" font-weight="800" text-anchor="middle" fill="white">A</text>
  <!-- brand name -->
  <text x="210" y="175" font-family="'Inter',system-ui,sans-serif"
        font-size="36" font-weight="700" fill="#1a1d23">PrimeArtifact</text>
  <text x="210" y="205" font-family="'Inter',system-ui,sans-serif"
        font-size="17" font-weight="400" fill="#8b909e">Free online tools · No login · No tracking · No ads</text>
  <!-- divider -->
  <line x1="120" y1="240" x2="1080" y2="240" stroke="#e0e3ea" stroke-width="1.5"/>
  <!-- tagline -->
  <text x="600" y="320" font-family="'Inter',system-ui,sans-serif"
        font-size="42" font-weight="800" text-anchor="middle" fill="#1a1d23"
        letter-spacing="-1">Every tool you need.</text>
  <text x="600" y="375" font-family="'Inter',system-ui,sans-serif"
        font-size="42" font-weight="800" text-anchor="middle" fill="#4a6fa5"
        letter-spacing="-1">One place. No login.</text>
  <!-- pills -->
  <rect x="185" y="430" width="140" height="36" rx="18" fill="#edf2f8"/>
  <text x="255" y="453" font-family="'Inter',sans-serif" font-size="14" font-weight="600"
        text-anchor="middle" fill="#4a6fa5">Word Counter</text>
  <rect x="340" y="430" width="150" height="36" rx="18" fill="#edf2f8"/>
  <text x="415" y="453" font-family="'Inter',sans-serif" font-size="14" font-weight="600"
        text-anchor="middle" fill="#4a6fa5">QR Generator</text>
  <rect x="505" y="430" width="170" height="36" rx="18" fill="#edf2f8"/>
  <text x="590" y="453" font-family="'Inter',sans-serif" font-size="14" font-weight="600"
        text-anchor="middle" fill="#4a6fa5">Color Converter</text>
  <rect x="690" y="430" width="170" height="36" rx="18" fill="#edf2f8"/>
  <text x="775" y="453" font-family="'Inter',sans-serif" font-size="14" font-weight="600"
        text-anchor="middle" fill="#4a6fa5">Age Calculator</text>
  <rect x="875" y="430" width="155" height="36" rx="18" fill="#edf2f8"/>
  <text x="952" y="453" font-family="'Inter',sans-serif" font-size="14" font-weight="600"
        text-anchor="middle" fill="#4a6fa5">Password Gen</text>
  <!-- URL -->
  <text x="600" y="522" font-family="'Inter',sans-serif" font-size="15"
        text-anchor="middle" fill="#8b909e">primeartifact.netlify.app</text>
</svg>
