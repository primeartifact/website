  <!-- Notepad Logic -->
  <script>
    (function () {
      var np = document.getElementById('notepad');
      var status = document.getElementById('save-status');
      var wc = document.getElementById('word-count');
      var KEY = 'primeartifact-notepad';
      var saveTimer;

      np.value = localStorage.getItem(KEY) || '';
      updateCount();

      np.addEventListener('input', function () {
        updateCount();
        status.textContent = 'Savingâ€¦';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function () {
          localStorage.setItem(KEY, np.value);
          status.textContent = 'Auto-saved';
        }, 500);
      });

      function updateCount() {
        var t = np.value;
        var words = t.trim() ? t.trim().split(/\s+/).length : 0;
        wc.textContent = words + ' words Â· ' + t.length + ' characters';
      }

      document.getElementById('btn-copy').addEventListener('click', function () {
        navigator.clipboard.writeText(np.value);
        this.textContent = 'âœ“ Copied'; var b = this; setTimeout(function () { b.textContent = 'â§‰ Copy All'; }, 1500);
      });

      document.getElementById('btn-clear').addEventListener('click', function () {
        if (confirm('Clear all notes?')) { np.value = ''; localStorage.setItem(KEY, ''); updateCount(); }
      });

      document.getElementById('btn-download').addEventListener('click', function () {
        var blob = new Blob([np.value], { type: 'text/plain' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'primeartifact-notes.txt';
        a.click();
      });
    })();
  </script>

  <!-- Interactive Elastic Bullet Journal Grid Logic -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    let dots = [];
    let mouseX = -1000, mouseY = -1000;
    const spacing = 40; // The spacing of the bullet journal grid

    window.addEventListener('mousemove', (e) => {
      mouseX = e.pageX;
      mouseY = e.pageY;
    });

    function initCanvas() {
      canvas.width = document.body.scrollWidth;
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);

      dots = [];
      const cols = Math.floor(canvas.width / spacing) + 1;
      const rows = Math.floor(canvas.height / spacing) + 1;

      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          dots.push(new ElasticDot(x * spacing, y * spacing));
        }
      }
    }

    class ElasticDot {
      constructor(ox, oy) {
        // Original anchored position
        this.ox = ox;
        this.oy = oy;
        // Current animated position
        this.x = ox;
        this.y = oy;
      }

      updateAndDraw() {
        let dx = mouseX - this.ox;
        let dy = mouseY - this.oy;
        let dist = Math.sqrt(dx * dx + dy * dy);

        let targetX = this.ox;
        let targetY = this.oy;
        let isHovered = false;

        // Interaction: Repel away from mouse
        if (dist < 120 && dist > 0) {
          isHovered = true;
          let force = (120 - dist) / 120; // 0 to 1

          // Push away outwards from mouse
          let pushOut = force * 25;
          targetX = this.ox - (dx / dist) * pushOut;
          targetY = this.oy - (dy / dist) * pushOut;
        }

        // Spring physics (Elastic snap back to target)
        this.x += (targetX - this.x) * 0.15;
        this.y += (targetY - this.y) * 0.15;

        // Fetch colors dynamically
        let themeColor = getComputedStyle(document.body).getPropertyValue('--text-tertiary').trim() || '#8b909e';
        let accentColor = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#4a6fa5';

        ctx.beginPath();
        if (isHovered) {
          ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = accentColor;
          ctx.globalAlpha = 0.4;
        } else {
          ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = themeColor;
          ctx.globalAlpha = 0.15; // Soft bullet journal grid
        }
        ctx.fill();
      }
    }

    window.addEventListener('resize', initCanvas);
    const resizeObserver = new ResizeObserver(() => {
      canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
    });
    resizeObserver.observe(document.body);

    initCanvas();

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dots.forEach(dot => dot.updateAndDraw());
      requestAnimationFrame(animate);
    }
    animate();
  </script>
